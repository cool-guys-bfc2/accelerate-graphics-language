<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NanoCraft 3D Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Courier New', monospace; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="hud">
        <h3>NanoCraft Engine 0.1</h3>
        WASD: Move | SPACE: Jump | CLICK: Lock Cursor<br>
        Blocks Rendered: <span id="block-count">0</span>
    </div>
    <div id="crosshair"></div>

    <!-- Import Three.js as a module -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONFIGURATION ---
        const WORLD_SIZE = 32; // 32x32 chunk
        const MAX_HEIGHT = 8;
        
        // --- 1. SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // False for performance
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambient = new THREE.AmbientLight(0xaaaaaa);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        scene.add(ambient, sun);

        // --- 2. SUPER EFFICIENT VOXEL ENGINE (InstancedMesh) ---
        // Instead of 10,000 Mesh objects, we use ONE InstancedMesh.
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x5da644 }); // Grass Green
        
        // Capacity for 100,000 blocks
        const mesh = new THREE.InstancedMesh(geometry, material, WORLD_SIZE * WORLD_SIZE * MAX_HEIGHT);
        scene.add(mesh);

        // --- 3. TERRAIN GENERATION ---
        const dummy = new THREE.Object3D();
        let i = 0;
        
        for (let x = -WORLD_SIZE/2; x < WORLD_SIZE/2; x++) {
            for (let z = -WORLD_SIZE/2; z < WORLD_SIZE/2; z++) {
                // Simple sine wave terrain
                const y = Math.floor(Math.sin(x * 0.1) * 3 + Math.cos(z * 0.1) * 3);
                
                // Stack blocks up to the height
                for (let h = -5; h <= y; h++) {
                    dummy.position.set(x, h, z);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i++, dummy.matrix);
                }
            }
        }
        mesh.instanceMatrix.needsUpdate = true;
        document.getElementById('block-count').innerText = i;

        // --- 4. PHYSICS & CONTROLS ---
        camera.position.set(0, 10, 10);
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        
        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if(camera.position.y < 10) velocity.y += 20; break; // Simple jump
            }
        });
        
        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        document.body.onclick = () => document.body.requestPointerLock();
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
            }
        });

        // --- GAME LOOP ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            // Friction & Gravity
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 50.0 * delta; // Gravity

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(velocity.z * delta);
            camera.position.y += velocity.y * delta;

            // Basic Floor Collision
            if (camera.position.y < 5) {
                velocity.y = 0;
                camera.position.y = 5;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
