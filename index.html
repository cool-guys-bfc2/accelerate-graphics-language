<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AccelGL</title>
    <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
    <script defer src="https://pyscript.net/latest/pyscript.js"></script>
</head>
<body>
    <py-config>
        packages = ["vpython"]
    </py-config>
<py-script>
from vpython import box, color, rate

# Create a box
my_box = box(color=color.red, size=vector(1,1,1))

# Simple animation loop
while True:
    rate(60)
    my_box.rotate(angle=0.01, axis=vector(0,1,0))
</py-script>
</body>
</html>
